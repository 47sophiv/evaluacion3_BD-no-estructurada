<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Videojuegos</title>

    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="stylesheet" href="./css/brite.css">
    <link rel="shortcut icon" href="./assets/images/game_controller.jpg" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="./scripts/formulario_videojuegos.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sistema Gestión Usuarios</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./inicio.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./formulario.html">Registro Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./videojuegos.html">Listado Videojuegos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./formulario_videojuegos.html">Registro Videojuegos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="contenedor_principal container mt-4">
        <form action="" id="formularioVideojuego">
            <p class="h1">Registro de Videojuego</p>
            <hr>

            <div class="row">
                <div class="col-md-6">
                    <label for="inputUsuarioNombre" class="form-label">Nombre del Usuario (Dueño):</label>
                    <input class="form-control" type="text" name="nombreUsuario" id="inputUsuarioNombre"
                        placeholder="Ej: Juan Pérez" onchange="validarInput($(this))">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputTitulo">Título del Videojuego:</label>
                    <input class="form-control" type="text" name="titulo" id="inputTitulo"
                        onchange="validarInput($(this))" placeholder="Ej: The Legend of Zelda">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col-md-4">
                    <label for="selectPlataforma" class="form-label">Plataforma:</label>
                    <select class="form-select" name="plataforma" id="selectPlataforma" onchange="validarInput($(this))">
                        <option value="" selected>Seleccione plataforma...</option>
                        <option value="PC">PC</option>
                        <option value="PlayStation 5">PlayStation 5</option>
                        <option value="PlayStation 4">PlayStation 4</option>
                        <option value="Nintendo Switch">Nintendo Switch</option>
                        <option value="Xbox Series X/S">Xbox Series X/S</option>
                        <option value="Xbox One">Xbox One</option>
                        <option value="Mobile">Mobile (Android/iOS)</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inputGenero">Género:</label>
                    <input class="form-control" type="text" name="genero" id="inputGenero"
                        onchange="validarInput($(this))" placeholder="Ej: RPG, Acción, Deportes">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inputHorasJugadas">Horas Jugadas:</label>
                    <input class="form-control" type="number" name="horasJugadas" id="inputHorasJugadas"
                        min="0" value="0" onchange="validarInput($(this))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="inputFechaCompra">Fecha de Compra:</label>
                    <input class="form-control" type="date" name="fechaCompra" id="inputFechaCompra">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="inputDesarrollador">Desarrollador:</label>
                    <input class="form-control" type="text" name="desarrollador" id="inputDesarrollador"
                        placeholder="Ej: Nintendo, Ubisoft, Sony">
                </div>
                <div class="col-md-4">
                    <label for="selectClasificacion" class="form-label">Clasificación:</label>
                    <select class="form-select" name="clasificacion" id="selectClasificacion">
                        <option value="" selected>Seleccione clasificación...</option>
                        <option value="EC">EC (Early Childhood)</option>
                        <option value="E">E (Everyone)</option>
                        <option value="E10+">E10+ (Everyone 10+)</option>
                        <option value="T">T (Teen)</option>
                        <option value="M">M (Mature 17+)</option>
                        <option value="AO">AO (Adults Only 18+)</option>
                        <option value="RP">RP (Rating Pending)</option>
                    </select>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col-md-6">
                    <label for="selectEstado" class="form-label">Estado de Juego:</label>
                    <select class="form-select" name="estado" id="selectEstado">
                        <option value="Pendiente" selected>Pendiente</option>
                        <option value="Jugando">Jugando</option>
                        <option value="Completado">Completado</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="inputPuntuacion">Puntuación (1-10):</label>
                    <input class="form-control" type="number" name="puntuacion" id="inputPuntuacion"
                        min="1" max="10" placeholder="Ej: 9">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col d-flex justify-content-end">
                    <button type="button" class="btn btn-secondary me-2" onclick="document.getElementById('formularioVideojuego').reset();">Limpiar</button>
                    <button type="button" class="btn btn-primary" onclick="validar_y_guardar();">Guardar Videojuego</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
